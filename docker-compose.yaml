services:
  database:
    image: "postgres:18.3-trixie"
    container_name: "database"

    ports:
      - 8080:5432
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    networks:
      - program-network


  app:
    image: "node:25.7-alpine3.23"
    container_name: "app"
    command: yarn run dev # change it while in production
    working_dir: /home/app
    
    ports: 
      - 8000:8080
    networks:
      - program-network
    volumes:
      - "./:/home/app"

    


networks:
  program-network:
    name: "program-network"
    driver: bridge

